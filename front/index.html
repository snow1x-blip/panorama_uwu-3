<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Виртуальный ремонт</title>
    <link rel="shortcut icon" href="photo/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <img class="svg-logo" src="photo/logo.svg">
        <div class="header-buttons">
            <button class="header-btn" onclick="openModal('login')">войти</button>
            <button class="header-btn" onclick="openModal('register')">регистрация</button>
        </div>
    </header>

    <!-- HERO SECTION (новый дизайн) -->
    <section class="hero-new">
        <div class="hero-envelope-container">
            <svg class="envelope-svg" viewBox="0 0 1399 749" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
                <rect width="1399" height="749" rx="20" fill="#00A6FF"/>
                <path d="M101 450 L700 63 L1296 450 L1296 869 L101 869 Z" fill="#005D8E"/>
                <rect x="297" y="92" width="900" height="535" rx="30" transform="rotate(7.1 747 360)" fill="white" fill-opacity="0.3"/>
                <rect x="258" y="121" width="934" height="540" rx="30" transform="rotate(4.8 725 391)" fill="white" fill-opacity="0.3"/>
                <rect x="206" y="185" width="934" height="540" rx="30" transform="rotate(-4.1 673 455)" fill="white"/>
                <path d="M101 869 L101 450 L372 544 L587 721 L587 869 Z" fill="#0086CD"/>
                <path d="M1296 868 L1296 449 L1025 543 L810 720 L810 868 Z" fill="#0086CD"/>
                <path d="M504 645 L397 870 L996 873 L889 645 Z" fill="#0086CD"/>
            </svg>
            <div class="hero-content-overlay">
                <h1 class="hero-new-title">Уникальная презентация<br>для риелтора<br>за пару кликов</h1>
                <p class="hero-new-subtitle">Создавайте презентации с помощью ИИ<br>для продажи квартир</p>
                <a class="hero-new-cta" href="pres_add.html">создать презентацию ✨</a>
            </div>
        </div>
    </section>

    <!-- STEPS SECTION -->
    <section class="steps-section">
        <h2 class="steps-title">Простота <span class="steps-badge tilt-badge">в 3 шага</span></h2>
        <div class="steps-cards">
            <div class="step-card animate-on-scroll">
                <svg class="step-icon" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                <p class="step-card-text">загрузите ссылку<br>на объект<br>недвижимости</p>
            </div>
            <div class="step-card animate-on-scroll">
                <svg class="step-icon" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                <p class="step-card-text">отредактируйте<br>полученный сценарий<br>для презентации</p>
            </div>
            <div class="step-card animate-on-scroll">
                <svg class="step-icon" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <p class="step-card-text">получите готовую<br>презентацию</p>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>

</body>
</html>
