<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый проект</title>
    <link rel="shortcut icon" href="photo/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/pres_add.css">
    <link rel="stylesheet" href="/front/css/pres_add.css">
</head>
<body>
    <header class="header">
        <img class="svg-logo" src="photo/logo.svg">
        <div class="header-buttons">
            <button class="header-btn">войти</button>
            <button class="header-btn">регистрация</button>
        </div>
    </header>

    <div class="layout">
        <!-- Sidebar -->
        <aside class="carts-sidebar">
            <nav class="carts-nav">
                <!-- Active item — icon + bold -->
                <a class="carts-nav-item active" href="index.html">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    Главная
                </a>
                <!-- Plain text, no icons -->
                <a class="carts-nav-item no-icon" href="profile.html">Профиль</a>
                <a class="carts-nav-item no-icon" href="pres_add.html">Новая квартира</a>
                <a class="carts-nav-item no-icon" href="about.html">О нас</a>
            </nav>
            <button class="carts-logout-btn" onclick="logout()">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                выйти
            </button>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <div class="carts-search">
                <input type="text" class="carts-search-input" placeholder="">
            </div>
            
            <h1 class="page-title">Новый проект</h1>
            
            <!-- Link Input -->
            <div class="link-input">
                <input type="text" id="propertyLink" placeholder="Вставьте ссылку на объявление (Циан, Авито и т.д.)">
            </div>
            
            <!-- Content Card -->
            <div class="content-card">
                <!-- Photos -->
                <div class="photos-row">
                    <div class="photo-placeholder">фото квартиры</div>
                    <div class="photo-placeholder">фото квартиры</div>
                    <div class="photo-placeholder">фото квартиры</div>
                </div>
                
                <!-- Info Boxes -->
                <div class="info-row">
                    <div class="info-box">
                        <h3 id="propertyTitle">Информация о квартире</h3>
                        <div class="details">
                            <div>количество комнат: <span id="rooms"> -</span></div>
                            <div>этаж: <span id="floor"> -</span></div>
                            <div>площадь квартиры: <span id="area"> -</span></div>
                        </div>
                    </div>
                    <div class="info-box">
                        <h3>Стоимость</h3>
                        <div class="details">
                            <div>цена: <span id="price"> -</span></div>
                            <div>цена за кв.м.: <span id="pricePerSqm"> -</span></div>
                            <div>адрес: <span id="address"> -</span></div>
                        </div>
                    </div>
                </div>
                
                <!-- Description -->
                <div class="info-box" style="margin-bottom: 32px;">
                    <h3>Описание объекта</h3>
                    <p id="description" class="description-text">
                      Ждем, пока вы загрузите ссылку
                    </p>
                </div>
                
                <!-- Presentation Text (скрыто до генерации) -->
                <div class="presentation-section" style="display: none;">
                    <h2>Текст для презентации:</h2>
                    <div id="slidesContainer">
                        <!-- Слайды будут добавлены здесь после генерации -->
                    </div>
                </div>
                
                <!-- Buttons -->
                <div class="actions-row">
                    <button id="loadPropertyBtn" class="btn btn-primary">Загрузить данные</button>
                    <button id="generateScenarioBtn" class="btn btn-outline">Сгенерировать сценарий презентации</button>
                    <button class="btn-icon" title="Редактировать">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/front/js/pres_add.js"></script>
    <script src="/front/js/auth.js"></script>
</body>
</html>
