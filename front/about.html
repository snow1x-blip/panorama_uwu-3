<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый проект</title>
  <link rel="shortcut icon" href="/front/photo/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/front/css/pres_add.css">
</head>
<body>

<header class="header">
    <img class="svg-logo" src="/front/photo/logo.svg">
    <div class="header-buttons">
        <button class="header-btn" onclick="openModal('login')">войти</button>
        <button class="header-btn" onclick="openModal('register')">регистрация</button>
    </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="carts-sidebar">
      <nav class="carts-nav">
          <!-- Active item — icon + bold -->
          <a class="carts-nav-item active" href="/front/index.html">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                  <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
              Главная
          </a>
          <!-- Plain text, no icons -->
          <a class="carts-nav-item no-icon" href="/front/profile.html">Профиль</a>
          <a class="carts-nav-item no-icon" href="/front/pres_add.html">Новая квартира</a>
          <a class="carts-nav-item no-icon" href="/front/about.html">О нас</a>
      </nav>
      <button class="carts-logout-btn" onclick="logout()">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          выйти
      </button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Search -->
    <div class="carts-search">
        <input type="text" class="carts-search-input" placeholder="">
    </div>

    <!-- Title -->
    <h1 class="page-title">Грани Development</h1>

    <!-- Content card -->
    <div class="content-card">

      <!-- Photos -->
      <div class="photos-row">
        <div class="photo-placeholder">фото команды</div>
        <div class="photo-placeholder">фото команды</div>
        <div class="photo-placeholder">фото команлы</div>
      </div>

      <!-- Info boxes -->
      <div class="info-row">
        <div class="info-box">
          <h3>Проделанная работа</h3>
          <div class="details">
            <p class="description-text">
                Text
            </p>
          </div>
        </div>
        <div class="info-box">
          <h3>Описание команды</h3>
          <p class="description-text">
            Text
          </p>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/front/js/auth.js"></script>

</body>
</html>
