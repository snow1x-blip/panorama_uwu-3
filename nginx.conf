server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    server_name _;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }
}

server {
    listen 80;
    server_name graniai.server72.ru;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name graniai.server72.ru;
    client_max_body_size 50M;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/graniai.server72.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/graniai.server72.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = / {
        root /home/lol07h/prod/panorama_grani/front;
        try_files /index.html =404;
        default_type text/html;
    }

    location = /create {
        root /home/lol07h/prod/panorama_grani/front;
        try_files /pres_add.html =404;
        default_type text/html;
    }

    location = /profile {
        root /home/lol07h/prod/panorama_grani/front;
        try_files /profile.html =404;
        default_type text/html;
    }

    location = /about {
        root /home/lol07h/prod/panorama_grani/front;
        try_files /about.html =404;
        default_type text/html;
    }

    location /front/ {
        root /home/lol07h/prod/panorama_grani;
    }

    location /esoft_front/ {
        root /home/lol07h/prod/panorama_grani;
    }

    location /static/ {
        root /home/lol07h/prod/panorama_grani/esoft_front;
    }

    location = /front/pres_add.html {
        return 302 /create;
    }

    location = /front/profile.html {
        return 302 /profile;
    }

    location = /front/about.html {
        return 302 /about;
    }

    location /api/v1/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }
}
